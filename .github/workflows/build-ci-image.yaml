name: Build CI image

on:
  push:
    branches: [main, staging]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build-ci-image.yaml'
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/stackwallet-ci

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push full image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: full
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push android image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: android
          push: true
          tags: ${{ env.GHCR_IMAGE }}:android
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push test image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: test
          push: true
          tags: ${{ env.GHCR_IMAGE }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
